<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="900" y2="380">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="g3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" fill="url(#bg3)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" letter-spacing="0.5">WHY OTHER MEMORY SYSTEMS FAIL</text>

  <!-- Header Row -->
  <rect x="30" y="55" width="840" height="35" rx="6" fill="#1e293b" opacity="0.8"/>
  <text x="160" y="77" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11" font-weight="600">SYSTEM</text>
  <text x="340" y="77" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11" font-weight="600">TOKENS / PROMPT</text>
  <text x="500" y="77" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11" font-weight="600">DEPENDENCIES</text>
  <text x="660" y="77" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11" font-weight="600">LATENCY</text>
  <text x="810" y="77" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11" font-weight="600">ENFORCED?</text>

  <!-- Cortex Row (highlighted) -->
  <rect x="30" y="95" width="840" height="45" rx="6" fill="#22c55e" opacity="0.08"/>
  <rect x="30" y="95" width="4" height="45" rx="2" fill="#22c55e"/>
  <text x="50" y="122" fill="#22c55e" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Cortex Memory</text>
  <text x="340" y="118" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="13" font-weight="700">~1,000</text>
  <text x="340" y="132" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="9">(30 when idle)</text>
  <text x="500" y="122" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="12">Python only</text>
  <text x="660" y="122" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="12">23–450ms</text>
  <!-- Green checkmark -->
  <circle cx="810" cy="118" r="14" fill="#22c55e" opacity="0.2" filter="url(#g3)"/>
  <text x="810" y="123" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="16" font-weight="700">YES</text>

  <!-- Separator -->
  <line x1="30" y1="145" x2="870" y2="145" stroke="#1e293b" stroke-width="1"/>

  <!-- CLAUDE.md Row -->
  <rect x="30" y="150" width="840" height="40" rx="4" fill="#ef4444" opacity="0.03"/>
  <text x="50" y="175" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">CLAUDE.md</text>
  <text x="340" y="175" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="12">5,000–15,000+</text>
  <text x="500" y="175" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">None</text>
  <text x="660" y="175" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">0ms (no search)</text>
  <circle cx="810" cy="171" r="12" fill="#ef4444" opacity="0.15"/>
  <text x="810" y="176" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="11" font-weight="600">NO</text>

  <!-- Separator -->
  <line x1="30" y1="195" x2="870" y2="195" stroke="#1e293b" stroke-width="1"/>

  <!-- Mem0 Row -->
  <rect x="30" y="200" width="840" height="40" rx="4" fill="#ef4444" opacity="0.03"/>
  <text x="50" y="225" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">Mem0</text>
  <text x="340" y="225" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="12">200–3,000</text>
  <text x="500" y="225" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="11">OpenAI + Qdrant + PostHog</text>
  <text x="660" y="225" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">~200ms + API</text>
  <circle cx="810" cy="221" r="12" fill="#ef4444" opacity="0.15"/>
  <text x="810" y="226" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="11" font-weight="600">NO</text>

  <!-- Separator -->
  <line x1="30" y1="245" x2="870" y2="245" stroke="#1e293b" stroke-width="1"/>

  <!-- Zep Row -->
  <rect x="30" y="250" width="840" height="40" rx="4" fill="#ef4444" opacity="0.03"/>
  <text x="50" y="275" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">Zep</text>
  <text x="340" y="275" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="12">~1,600</text>
  <text x="500" y="275" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="11">Neo4j + OpenAI + BGE</text>
  <text x="660" y="275" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">&lt;200ms + graph</text>
  <circle cx="810" cy="271" r="12" fill="#ef4444" opacity="0.15"/>
  <text x="810" y="276" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="11" font-weight="600">NO</text>

  <!-- Separator -->
  <line x1="30" y1="295" x2="870" y2="295" stroke="#1e293b" stroke-width="1"/>

  <!-- MemGPT Row -->
  <rect x="30" y="300" width="840" height="40" rx="4" fill="#ef4444" opacity="0.03"/>
  <text x="50" y="325" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">MemGPT / Letta</text>
  <text x="340" y="325" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="12">2,081 + 2K–8K</text>
  <text x="500" y="325" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="11">Docker + Postgres + LLM</text>
  <text x="660" y="325" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="12" font-weight="600">2–7 MINUTES</text>
  <circle cx="810" cy="321" r="12" fill="#ef4444" opacity="0.15"/>
  <text x="810" y="326" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="11" font-weight="600">NO</text>

  <!-- Bottom callout -->
  <rect x="250" y="350" width="400" height="24" rx="12" fill="#22c55e" opacity="0.1"/>
  <text x="450" y="367" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="11" font-weight="600">If Claude can ignore your memories, your memory system doesn't work.</text>
</svg>
